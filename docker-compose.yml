services:
  build-planner:
    build: .
    container_name: build-planner
    ports:
      - "8088:8000"
    environment:
      APP_NAME: Build Planner
      APP_ENV: production
      DATABASE_PATH: /app/data/build_planner.db
      LOG_LEVEL: INFO
      DEFAULT_THEME: light
    volumes:
      - ./data:/app/data
    restart: unless-stopped
